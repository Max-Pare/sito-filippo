<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Appuntamenti</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        h2 {
            margin-bottom: 20px;
        }
        ol {
            padding-left: 20px;
        }
        li {
            margin-bottom: 12px;
            padding: 10px;
            background: #eef2f7;
            border-radius: 6px;
        }
        li:hover {
            background: #e0e7ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Appuntamenti</h2>
        <ol>
            {% for e in entries %}
                <li>{{ e }}</li>
            {% endfor %}
        </ol>
    </div>
</body>
</html>
